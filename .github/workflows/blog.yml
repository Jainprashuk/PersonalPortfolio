name: Auto Blog Generator

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  generate-blog:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate blog
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generateBlog.js

      - name: Commit and push blog
        run: |
          git config --global user.name "blog-bot"
          git config --global user.email "bot@github.com"

          git add blogs
          git commit -m "Auto generated blog" || echo "No changes"

          git fetch origin main
          git rebase origin/main

          git push origin main